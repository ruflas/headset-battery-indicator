name: Build AppImage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install system dependencies for Qt
      run: |
        sudo apt-get update -q
        sudo apt-get install -y -q libgl1 libegl1 libxkbcommon-x11-0 \
          libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
          libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
          libxcb-xinerama0 libxcb-cursor0 xvfb

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt PySide6
        pip install --no-deps -e .

    - name: Run tests
      env:
        QT_QPA_PLATFORM: offscreen
        QT_X11_NO_MITSHM: 1
      run: xvfb-run --auto-servernum python -m pytest tests/ -v

  build-linux:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install briefcase

    - name: Package with Briefcase
      run: |
        briefcase package linux appimage --no-input

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        path: dist/*.AppImage
        retention-days: 30
