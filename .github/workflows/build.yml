name: CI / Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libgl1 libegl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-cursor0

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-qt PySide6
          pip install --no-deps -e .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -v

  # ── AppImage (Linux) ─────────────────────────────────────────────────────
  build-appimage:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Build AppImage
        run: briefcase package linux appimage --no-input

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage
          path: dist/*.AppImage
          retention-days: 7

  # ── Windows EXE ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 pillow
          pip install --no-deps -e .

      - name: Convert icon to .ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('headset-battery-indicator.png').convert('RGBA')
          img.save('headset-battery-indicator.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          "

      - name: Build Windows EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name headset-battery-indicator
          --icon headset-battery-indicator.ico
          --add-data "headset_battery_indicator/translations;headset_battery_indicator/translations"
          run.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/headset-battery-indicator.exe
          retention-days: 7

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-appimage, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: AppImage
          path: release-assets

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: Windows-EXE
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
